<svg viewBox="0 0 720 500" width="720" height="500" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
<title>Big brain thinks, small brain builds — tokens where they matter</title>
<desc>A premium model (the analyst) writes the design, specs and tests — rare, expensive tokens spent on judgment. It hands a precise plan to a cheap local 12B model that generates the code — free, abundant tokens on an 8GB GPU. Every line is gated by tests and pinned for reproducibility. Premium judgment, cheap labor, each spent where it is worth most.</desc>
<rect x="0" y="0" width="720" height="500" fill="#ffffff"/>
<defs><marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#4f46e5"/></marker></defs>

<text x="360" y="34" text-anchor="middle" font-size="20" font-weight="600" fill="#111827">Big brain thinks. Small brain builds.</text>
<text x="360" y="57" text-anchor="middle" font-size="13.5" fill="#6b7280">spend premium tokens on judgment — let a cheap local model do the volume</text>

<!-- BIG / premium -->
<rect x="190" y="86" width="340" height="84" rx="11" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.6"/>
<text x="360" y="116" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">Premium model — the analyst</text>
<text x="360" y="138" text-anchor="middle" font-size="13" fill="#4f46e5">the thinking</text>
<text x="360" y="157" text-anchor="middle" font-size="12.5" fill="#6b7280">design · specifications · tests · architecture</text>
<text x="30" y="116" font-size="12.5" font-weight="600" fill="#4f46e5">rare + expensive</text>
<text x="30" y="134" font-size="11.5" fill="#6b7280">a few tokens,</text>
<text x="30" y="150" font-size="11.5" fill="#6b7280">where judgment lives</text>

<line x1="360" y1="170" x2="360" y2="206" stroke="#4f46e5" stroke-width="1.6" marker-end="url(#a)"/>
<text x="372" y="190" font-size="12" fill="#6b7280">the plan — work broken into</text>
<text x="372" y="204" font-size="12" fill="#6b7280">small, fully-specified tasks</text>

<!-- SMALL / local -->
<rect x="190" y="208" width="340" height="84" rx="11" fill="#ffffff" stroke="#9ca3af" stroke-width="1.6"/>
<text x="360" y="238" text-anchor="middle" font-size="16" font-weight="600" fill="#111827">Local 12B model — the implementer</text>
<text x="360" y="260" text-anchor="middle" font-size="13" fill="#6b7280">the building</text>
<text x="360" y="279" text-anchor="middle" font-size="12.5" fill="#6b7280">generates the code, by the thousand lines</text>
<text x="556" y="238" font-size="12.5" font-weight="600" fill="#111827">free + abundant</text>
<text x="556" y="256" font-size="11.5" fill="#6b7280">thousands of tokens,</text>
<text x="556" y="272" font-size="11.5" fill="#6b7280">on an 8 GB GPU</text>

<line x1="360" y1="292" x2="360" y2="328" stroke="#9ca3af" stroke-width="1.6" marker-end="url(#a)"/>

<!-- gate + pin -->
<rect x="190" y="330" width="340" height="46" rx="10" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.6"/>
<text x="360" y="358" text-anchor="middle" font-size="13.5" font-weight="600" fill="#111827">every line gated (tests) + pinned (reproducible)</text>

<!-- thesis -->
<text x="360" y="424" text-anchor="middle" font-size="13.5" fill="#111827">the big model turns hard reasoning into a precise spec; the small model executes it.</text>
<text x="360" y="448" text-anchor="middle" font-size="13" fill="#4f46e5">premium judgment, cheap labor — each spent where it's worth most.</text>
<text x="360" y="470" text-anchor="middle" font-size="12.5" fill="#6b7280">small isn't worthless · big isn't wasted · tokens balanced where they matter</text>
</svg>
