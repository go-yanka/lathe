<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="952" viewBox="0 0 1600 952" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <!-- palette: bg #F4EEE1 · ink #3D2B22 · teal #7EA8A1 · coral #E4986B · sage #8DB26A -->
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#3D2B22" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1600" height="952" fill="#F4EEE1"/>

  <!-- Title -->
  <text x="800" y="88" text-anchor="middle" font-size="50" font-weight="800" fill="#3D2B22">The discipline you already believe in — <tspan fill="#8DB26A">enforced</tspan></text>
  <text x="800" y="132" text-anchor="middle" font-size="24" font-weight="500" fill="#8a7a6f">test-first  ·  never merge red  ·  locked builds  ·  don&#8217;t hand-patch the compiler</text>

  <!-- Column headers -->
  <text x="690" y="196" text-anchor="middle" font-size="21" font-weight="700" fill="#b07a5a" letter-spacing="1.5">YOU ALREADY DO THIS</text>
  <text x="690" y="222" text-anchor="middle" font-size="15" font-weight="500" fill="#a89685">TDD · CI · lockfiles · the compiler contract</text>
  <rect x="1075" y="176" width="360" height="40" rx="20" fill="#8DB26A"/>
  <text x="1255" y="203" text-anchor="middle" font-size="21" font-weight="800" fill="#ffffff" letter-spacing="1.5">LATHE ENFORCES IT</text>

  <!-- ================= ROWS ================= -->
  <!-- geometry: icon circle cx=110; row card x=190 w=1300 h=118; left cell center ~690; divider x=940; right text x=985 -->

  <!-- Row 1: TEST-FIRST -->
  <g transform="translate(0,258)">
    <rect x="190" y="0" width="1300" height="118" rx="18" fill="#ffffff" filter="url(#soft)"/>
    <circle cx="110" cy="59" r="42" fill="#7EA8A1"/>
    <!-- checklist icon -->
    <rect x="92" y="36" width="36" height="46" rx="5" fill="#ffffff"/>
    <line x1="100" y1="48" x2="120" y2="48" stroke="#7EA8A1" stroke-width="3" stroke-linecap="round"/>
    <line x1="100" y1="59" x2="120" y2="59" stroke="#7EA8A1" stroke-width="3" stroke-linecap="round"/>
    <path d="M99 70 l4 4 l7 -8" fill="none" stroke="#8DB26A" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="215" y="52" font-size="24" font-weight="800" fill="#3D2B22">TEST-FIRST</text>
    <!-- left cell -->
    <circle cx="560" cy="59" r="15" fill="#eae0d0"/><path d="M553 59 l5 5 l9 -11" fill="none" stroke="#b8a894" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="590" y="65" font-size="19" font-style="italic" fill="#bcae9d">&#8230;until Friday</text>
    <line x1="940" y1="26" x2="940" y2="92" stroke="#ece3d5" stroke-width="2"/>
    <!-- right cell -->
    <circle cx="985" cy="59" r="16" fill="#8DB26A"/><path d="M977 59 l5 5 l10 -12" fill="none" stroke="#ffffff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="1022" y="66" font-size="22" font-weight="600" fill="#3D2B22">analyst writes the test first</text>
  </g>

  <!-- Row 2: NEVER MERGE RED -->
  <g transform="translate(0,392)">
    <rect x="190" y="0" width="1300" height="118" rx="18" fill="#ffffff" filter="url(#soft)"/>
    <circle cx="110" cy="59" r="42" fill="#E4986B"/>
    <!-- build light icon -->
    <rect x="98" y="34" width="24" height="50" rx="9" fill="#ffffff"/>
    <circle cx="110" cy="47" r="7" fill="#d9534f"/>
    <circle cx="110" cy="70" r="7" fill="#8DB26A"/>
    <text x="215" y="52" font-size="24" font-weight="800" fill="#3D2B22">NEVER MERGE RED</text>
    <circle cx="560" cy="59" r="15" fill="#eae0d0"/><path d="M553 59 l5 5 l9 -11" fill="none" stroke="#b8a894" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="590" y="65" font-size="19" font-style="italic" fill="#bcae9d">&#8230;when there&#8217;s time</text>
    <line x1="940" y1="26" x2="940" y2="92" stroke="#ece3d5" stroke-width="2"/>
    <circle cx="985" cy="59" r="16" fill="#8DB26A"/><path d="M977 59 l5 5 l10 -12" fill="none" stroke="#ffffff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="1022" y="66" font-size="22" font-weight="600" fill="#3D2B22">the gate refuses a red build</text>
  </g>

  <!-- Row 3: LOCKED BUILDS -->
  <g transform="translate(0,526)">
    <rect x="190" y="0" width="1300" height="118" rx="18" fill="#ffffff" filter="url(#soft)"/>
    <circle cx="110" cy="59" r="42" fill="#8DB26A"/>
    <!-- padlock icon -->
    <path d="M100 52 v-6 a10 10 0 0 1 20 0 v6" fill="none" stroke="#ffffff" stroke-width="4"/>
    <rect x="94" y="52" width="32" height="26" rx="5" fill="#ffffff"/>
    <circle cx="110" cy="63" r="4" fill="#8DB26A"/>
    <text x="215" y="52" font-size="24" font-weight="800" fill="#3D2B22">LOCKED BUILDS</text>
    <circle cx="560" cy="59" r="15" fill="#eae0d0"/><path d="M553 59 l5 5 l9 -11" fill="none" stroke="#b8a894" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="590" y="65" font-size="19" font-style="italic" fill="#bcae9d">&#8230;until Friday</text>
    <line x1="940" y1="26" x2="940" y2="92" stroke="#ece3d5" stroke-width="2"/>
    <circle cx="985" cy="59" r="16" fill="#8DB26A"/><path d="M977 59 l5 5 l10 -12" fill="none" stroke="#ffffff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="1022" y="66" font-size="22" font-weight="600" fill="#3D2B22">content-hash pins the build</text>
  </g>

  <!-- Row 4: DON'T HAND-PATCH THE COMPILER -->
  <g transform="translate(0,660)">
    <rect x="190" y="0" width="1300" height="118" rx="18" fill="#ffffff" filter="url(#soft)"/>
    <circle cx="110" cy="59" r="42" fill="#c98a6a"/>
    <!-- gear icon -->
    <g transform="translate(110,59)" fill="#ffffff">
      <circle r="15"/>
      <g fill="#c98a6a"><circle r="7"/></g>
      <g stroke="#ffffff" stroke-width="6" stroke-linecap="round">
        <line x1="0" y1="-20" x2="0" y2="-13"/><line x1="0" y1="20" x2="0" y2="13"/>
        <line x1="-20" y1="0" x2="-13" y2="0"/><line x1="20" y1="0" x2="13" y2="0"/>
        <line x1="-14" y1="-14" x2="-9" y2="-9"/><line x1="14" y1="14" x2="9" y2="9"/>
        <line x1="14" y1="-14" x2="9" y2="-9"/><line x1="-14" y1="14" x2="-9" y2="9"/>
      </g>
    </g>
    <text x="215" y="46" font-size="21" font-weight="800" fill="#3D2B22">DON&#8217;T HAND-PATCH</text>
    <text x="215" y="72" font-size="21" font-weight="800" fill="#3D2B22">THE COMPILER</text>
    <circle cx="560" cy="59" r="15" fill="#eae0d0"/><path d="M553 59 l5 5 l9 -11" fill="none" stroke="#b8a894" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="590" y="65" font-size="19" font-style="italic" fill="#bcae9d">&#8230;when there&#8217;s time</text>
    <line x1="940" y1="26" x2="940" y2="92" stroke="#ece3d5" stroke-width="2"/>
    <circle cx="985" cy="59" r="16" fill="#8DB26A"/><path d="M977 59 l5 5 l10 -12" fill="none" stroke="#ffffff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="1022" y="66" font-size="22" font-weight="600" fill="#3D2B22">wrong code = fix the spec, rebuild</text>
  </g>

  <!-- Footer ribbon -->
  <rect x="190" y="812" width="1300" height="52" rx="26" fill="#3D2B22"/>
  <text x="840" y="845" text-anchor="middle" font-size="20" font-weight="600" fill="#F4EEE1">good practice runs on willpower — and willpower loses to deadlines.  <tspan fill="#8DB26A" font-weight="800">move it onto the machine.</tspan></text>
</svg>
