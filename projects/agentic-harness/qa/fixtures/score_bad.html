<!doctype html><html><head><meta charset="utf-8"><title>score-bad</title></head>
<body style="margin:0;background:#101418">
<div id="score" style="color:#fff;font:16px monospace">Score: 0</div>
<canvas id="c" width="480" height="360"></canvas>
<script>
// A BROKEN scorer (the class this must catch): it draws + has a score label, but Space never scores —
// the state is frozen at 0. Passes liveness/structure, but the game does not actually keep score.
const cv = document.getElementById('c'), ctx = cv.getContext('2d');
let t = 0;
addEventListener('keydown', e => { if (e.code === 'Space') e.preventDefault(); });  // swallowed, no scoring
function step() {
  t += 0.05;
  ctx.fillStyle = '#101418'; ctx.fillRect(0, 0, 480, 360);
  ctx.fillStyle = '#57c7ff'; ctx.fillRect(60 + Math.sin(t) * 10, 170, 24, 24);  // idle bob (animates, but score stuck)
  requestAnimationFrame(step);
}
step();
</script>
</body></html>
