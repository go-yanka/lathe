<!doctype html><html><head><meta charset="utf-8"><title>heli-bad</title></head>
<body style="margin:0;background:#0b1020">
<canvas id="c" width="480" height="360"></canvas>
<script>
// A BROKEN helicopter (the class this gate must catch): it ANIMATES (falls), so the liveness gate passes it —
// but Space is wired to NOTHING, so the craft falls regardless of input and the game is unplayable.
const cv = document.getElementById('c'), ctx = cv.getContext('2d');
let y = 180, vy = 0;
addEventListener('keydown', e => { if (e.code === 'Space') e.preventDefault(); });  // swallows the key, does nothing
function step() {
  vy += 0.12; vy *= 0.99; y += vy;      // pure gravity, no thrust path (matches heli_good's gravity)
  if (y > 348) { y = 348; vy = 0; }
  ctx.fillStyle = '#0b1020'; ctx.fillRect(0, 0, 480, 360);
  ctx.fillStyle = '#e8c547'; ctx.fillRect(210, y - 8, 60, 16);
  requestAnimationFrame(step);
}
step();
</script>
</body></html>
