<!doctype html><html><head><meta charset="utf-8"><title>gameover-bad</title></head>
<body style="margin:0;background:#101418">
<canvas id="c" width="480" height="360"></canvas>
<div id="msg" style="color:#f55;font:20px monospace"></div>
<script>
// The literal helicopter symptom: the game ends the instant it starts. The canvas ANIMATES briefly (so the
// old liveness check passes), then shows GAME OVER almost immediately — unplayable. web_canvas_game must FAIL.
const cv = document.getElementById('c'), ctx = cv.getContext('2d'), msg = document.getElementById('msg');
let y = 40, over = false;
function step() {
  if (!over) {
    y += 6;
    ctx.fillStyle = '#101418'; ctx.fillRect(0, 0, 480, 360);
    ctx.fillStyle = '#e8c547'; ctx.fillRect(230, y, 20, 20);
    if (y > 120) { over = true; msg.textContent = 'GAME OVER'; }  // dies ~0.3s after start
    requestAnimationFrame(step);
  }
}
step();
</script>
</body></html>
